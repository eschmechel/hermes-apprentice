name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: make coverage-go
      - run: pip install -e orchestrator -e trainer -e validator pytest-cov mcp
      - run: |
          for pkg in orchestrator trainer validator; do
            cd "$pkg" && python -m pytest tests/ -q --cov --cov-report=xml
          done

      - name: Check coverage threshold
        run: |
          echo "Go coverage:"
          for f in /tmp/cov-*.out; do
            go tool cover -func="$f" | tail -1
          done
          echo "Python coverage:"
          for pkg in orchestrator trainer validator; do
            echo "--- $pkg ---"
            python -c "
import xml.etree.ElementTree as ET
tree = ET.parse('$pkg/coverage.xml')
rate = tree.getroot().attrib['line-rate']
pct = float(rate) * 100
print(f'{pkg}: {pct:.1f}%')
"
          done
