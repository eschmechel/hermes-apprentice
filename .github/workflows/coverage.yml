name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: make coverage-go
      - run: pip install -e telegram -e trainer -e validator -e orchestrator pytest-cov mcp
      - run: |
          for pkg in orchestrator trainer validator; do
            (cd "$pkg" && python -m pytest tests/ -q --cov --cov-report=xml)
          done

      - name: Report coverage
        run: |
          echo "Go coverage:"
          for f in /tmp/cov-*.out; do
            go tool cover -func="$f" | tail -1
          done
          echo "Python coverage:"
          for pkg in orchestrator trainer validator; do
            echo "--- $pkg ---"
            grep 'line-rate' "$pkg/coverage.xml" | head -1
          done
