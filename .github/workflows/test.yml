name: Test

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [proxy, dataset-builder, registry-service, burst]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test ./... -coverprofile=coverage.out
        working-directory: ${{ matrix.module }}
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.out

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [orchestrator, trainer, validator, serving, telegram]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install -e telegram -e trainer -e validator -e orchestrator -e serving pytest pytest-cov mcp
      - run: pytest tests/ -v --cov --cov-report=xml
        working-directory: ${{ matrix.pkg }}
      - uses: actions/upload-artifact@v4
        with:
          name: py-coverage-${{ matrix.pkg }}
          path: ${{ matrix.pkg }}/coverage.xml

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: check
