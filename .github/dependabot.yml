version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - "/proxy"
      - "/dataset-builder"
      - "/registry-service"
      - "/burst"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directories:
      - "/orchestrator"
      - "/trainer"
      - "/validator"
      - "/serving"
      - "/telegram"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
