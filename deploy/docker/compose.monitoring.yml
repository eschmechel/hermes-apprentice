services:
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: apprentice-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ../grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - apprentice-prometheus-data:/prometheus
    expose:
      - 9090
    networks:
      - apprentice

  grafana:
    image: grafana/grafana:11.6.0
    container_name: apprentice-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=apprentice
      - GF_INSTALL_PLUGINS=
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - apprentice-grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    networks:
      - apprentice

volumes:
  apprentice-prometheus-data:
  apprentice-grafana-data:

networks:
  apprentice:
    external: false
    name: apprentice-monitoring
